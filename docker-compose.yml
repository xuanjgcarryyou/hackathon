version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hackathon
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d hackathon"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  middleware:
    build: ./middleware
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - middleware

volumes:
  db_data:
